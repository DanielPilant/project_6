name: Backend CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Start Database and App via Docker Compose
        run: docker compose up -d db

      - name: Wait for MySQL to be ready
        run: |
          while status=$(docker inspect --format "{{.State.Health.Status}}" $(docker compose ps -q db)); do
            if [ "$status" = "healthy" ]; then break; fi
            sleep 3
          done

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: rootpassword
          DB_NAME: jsonplaceholder_db
        run: npm test

      - name: Tear down Docker
        if: always()
        run: docker compose down -v

  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ghcr.io image paths must be all lowercase, but github.repository can
      # contain uppercase (e.g. DanielPilant/project_6). Lowercase it here.
      - name: Prepare lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/project-6-backend" >> "$GITHUB_ENV"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Execute Deployment on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/danielpilant/project-6-backend:latest
            cat << 'EOF' > docker-compose.
            version: '3.8'
            services:
              db:
                image: mysql:8.0
                environment:
                  MYSQL_ROOT_PASSWORD: rootpassword
                  MYSQL_DATABASE: jsonplaceholder_db
                ports:
                  - "3306:3306"
              backend:
                image: ghcr.io/danielpilant/project-6-backend:latest
                ports:
                  - "80:3000" 
                depends_on:
                  - db
                environment:
                  DB_HOST: db
                  DB_USER: root
                  DB_PASSWORD: rootpassword
                  DB_NAME: jsonplaceholder_db
            EOF

            docker compose up -d
