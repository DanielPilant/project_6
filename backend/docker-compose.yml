version: "3.8"

services:
  db:
    image: mysql:8.0
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: jsonplaceholder_db

    ports:
      - "3306:3306"

    voluems:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 30s
      retries: 10

  app:
    build: .

    ports:
      - "3000:3000"

    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=jsonplaceholder_db
      - PORT=3000

    depends_on:
      db:
        condition: service_healthy
