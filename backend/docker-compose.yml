version: "3.8"

services:
  db:
    image: mysql:8.0
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: jsonplaceholder_db

    ports:
      - "3306:3306"

    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      # Force a TCP + authenticated ping so "healthy" only reports once the real
      # server (after init.sql has loaded) is accepting connections — not during
      # MySQL's temporary init phase.
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpassword"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 30s

  app:
    build: .

    ports:
      - "3000:3000"

    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=jsonplaceholder_db
      - PORT=3000

    depends_on:
      db:
        condition: service_healthy
